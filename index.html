<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>会議AIアシスト</title>
  <link rel="icon" href="favicon.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { indigo: { 950: '#1e1b4b' } },
          boxShadow: { soft: '0 2px 12px rgba(0,0,0,0.06)' },
          keyframes: {
            ripple: {
              '0%': { boxShadow: '0 0 0 0 rgba(79,70,229,0.4)' },
              '100%': { boxShadow: '0 0 0 16px rgba(79,70,229,0)' }
            }
          },
          animation: { ripple: 'ripple 1.2s infinite' }
        }
      }
    };
  </script>

  <style>
    .thin-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .thin-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
    .thin-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
    .minutes-content p { margin-bottom: 0.5rem; }
  </style>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-slate-50 text-slate-800">
<div id="root" class="min-h-screen"></div>

<script type="text/babel">

const POWER_AUTOMATE_URL = "https://default3d540d42b0fd4a55b84fb51a4a6da5.a3.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/4d600fd0b5aa4cb299968b98671ce7eb/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=08qqzyn5t5y3Z0x1TPuaB5EQLrhA2vxTqkZvxWE5yA4";
const RECOGNITION_LANG = "ja-JP";

/* ---------------- Icons ---------------- */
const Icon = ({name, className="w-5 h-5"}) => {
  const common = "fill-none stroke-current stroke-[1.6]";
  switch (name) {
    case "mic": return (
      <svg className={`${className} ${common}`} viewBox="0 0 24 24">
        <path d="M12 1.5a3.5 3.5 0 0 1 3.5 3.5v6a3.5 3.5 0 0 1-7 0v-6A3.5 3.5 0 0 1 12 1.5z"/>
        <path d="M19 11a7 7 0 0 1-14 0"/><path d="M12 18v4"/>
      </svg>
    );
    case "stop": return (
      <svg className={`${className} ${common}`} viewBox="0 0 24 24">
        <rect x="6" y="6" width="12" height="12" rx="2"/>
      </svg>
    );
    case "send": return (
      <svg className={`${className} ${common}`} viewBox="0 0 24 24">
        <path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/>
      </svg>
    );
    case "file": return (
      <svg className={`${className} ${common}`} viewBox="0 0 24 24">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
    );
    case "copy": return (
      <svg className={`${className} ${common}`} viewBox="0 0 24 24">
        <rect x="9" y="9" width="13" height="13" rx="2"/>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
    );
    case "trash": return (
      <svg className={`${className} ${common}`} viewBox="0 0 24 24">
        <path d="M3 6h18"/>
        <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6M14 11v6"/>
      </svg>
    );
  }
};

const Toast = ({msg, onClose}) => (
  <div className="fixed top-4 right-4 z-50">
    <div className="bg-slate-900 text-white px-4 py-2 rounded shadow-lg flex items-center gap-2 text-sm">
      <span>{msg}</span>
      <button onClick={onClose} className="ml-2 hover:text-indigo-400">×</button>
    </div>
  </div>
);

/* ===================== APP ===================== */
function App() {
  const [isRecording, setIsRecording] = React.useState(false);
  const [finalChunks, setFinalChunks] = React.useState([]);
  const [interim, setInterim] = React.useState("");
  const [preInfo, setPreInfo] = React.useState("");
  const [suggestions, setSuggestions] = React.useState([]);
  const [minutes, setMinutes] = React.useState("");
  const [loadingAI, setLoadingAI] = React.useState(false);
  const [loadingMinutes, setLoadingMinutes] = React.useState(false);
  const [toastMsg, setToastMsg] = React.useState("");

  const transcriptRef = React.useRef(null);
  const recognitionRef = React.useRef(null);
  const streamRef = React.useRef(null);
  const manualStopRef = React.useRef(false);

  React.useEffect(() => {
    if (transcriptRef.current) {
      transcriptRef.current.scrollTop = transcriptRef.current.scrollHeight;
    }
  }, [finalChunks, interim]);

  const ensureRecognition = React.useCallback(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return null;
    if (!recognitionRef.current) {
      const r = new SR();
      r.lang = RECOGNITION_LANG;
      r.interimResults = true;
      r.continuous = true;
      r.onresult = (e) => {
        let inter = "";
        const finals = [];
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const res = e.results[i];
          if (res.isFinal) finals.push(res[0].transcript.trim());
          else inter += res[0].transcript;
        }
        if (finals.length) setFinalChunks(p => [...p, ...finals]);
        setInterim(inter.trim());
      };
      r.onend = () => { if (!manualStopRef.current) try { r.start(); } catch {} };
      recognitionRef.current = r;
    }
    return recognitionRef.current;
  }, []);

  async function startRecording() {
    const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
    streamRef.current = stream;
    manualStopRef.current = false;
    ensureRecognition().start();
    setIsRecording(true);
    stream.getVideoTracks()[0].onended = stopRecording;
  }

  function stopRecording() {
    manualStopRef.current = true;
    recognitionRef.current?.stop();
    streamRef.current?.getTracks().forEach(t => t.stop());
    setIsRecording(false);
  }

  const fullText = (finalChunks.join(" ") + " " + interim).trim();

  async function callPowerAutomate(type) {
    if (!fullText) { setToastMsg("文字起こしがありません"); return; }

    type === "suggest" ? setLoadingAI(true) : setLoadingMinutes(true);

    const body = {
      timestamp: new Date().toISOString(),
      transcript: fullText,
      requestType: type,
      preInfo: type === "suggest" ? preInfo : ""
    };

    try {
      const res = await fetch(POWER_AUTOMATE_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      const text = await res.text();
      type === "suggest"
        ? setSuggestions(text.split(/\n+/).filter(Boolean))
        : setMinutes(text);
    } catch {
      setToastMsg("Power Automate送信エラー");
    } finally {
      setLoadingAI(false);
      setLoadingMinutes(false);
    }
  }

  return (
    <div className="max-w-5xl mx-auto px-4 py-6 flex flex-col gap-6 min-h-screen">
      {toastMsg && <Toast msg={toastMsg} onClose={() => setToastMsg("")} />}

      <header className="flex justify-between items-end border-b pb-4">
        <h1 className="text-2xl font-bold text-indigo-900 flex gap-2">
          <Icon name="mic" /> 会議AIアシスト
        </h1>
        <div className="flex gap-2">
          {!isRecording ? (
            <button onClick={startRecording} className="btn bg-indigo-600 text-white px-4 py-2 rounded">
              録音開始
            </button>
          ) : (
            <button onClick={stopRecording} className="btn bg-rose-600 text-white px-4 py-2 rounded">
              停止
            </button>
          )}
          {/* ボタンに disabled とテキストの条件分岐を追加 */}
          <button onClick={() => callPowerAutomate("suggest")} disabled={loadingAI} className="px-4 py-2 bg-indigo-100 rounded disabled:opacity-50">
            {loadingAI ? "作成中..." : "AI意見案"}
          </button>
          <button onClick={() => callPowerAutomate("minutes")} disabled={loadingMinutes} className="px-4 py-2 bg-emerald-100 rounded disabled:opacity-50">
            {loadingMinutes ? "作成中..." : "議事録作成"}
          </button>
          <button onClick={() => {
            setFinalChunks([]); setInterim(""); setPreInfo("");
            setSuggestions([]); setMinutes("");
          }}>
            <Icon name="trash" />
          </button>
        </div>
      </header>

      {/* 意見案 */}
      <section>
        <h2 className="font-bold text-sm mb-2">意見案</h2>
        <div className="bg-white p-4 rounded shadow">
          {/* loadingAI が true のときに作成中のテキストを表示 */}
          {loadingAI ? (
            <div className="text-slate-500 animate-pulse">作成中...</div>
          ) : (
            suggestions.map((s, i) => <div key={i}>{s}</div>)
          )}
        </div>
      </section>

      {/* 事前情報 */}
      <section>
        <h2 className="font-bold text-sm mb-2">事前情報</h2>
        <textarea
          value={preInfo}
          onChange={e => setPreInfo(e.target.value)}
          className="w-full h-24 border rounded p-2"
          placeholder="会議の目的・会議の内容・事前に知っている情報など"
        />
      </section>

      {/* 文字起こし */}
      <section>
        <h2 className="font-bold text-sm mb-2">文字起こし</h2>
        <div ref={transcriptRef} className="bg-slate-900 text-slate-300 p-4 rounded h-40 overflow-y-auto">
          {fullText || "待機中..."}
        </div>
      </section>

      {/* 議事録 */}
      <section>
        <h2 className="font-bold text-sm mb-2">議事録</h2>
        <div className="bg-emerald-50 p-4 rounded min-h-[150px] whitespace-pre-wrap">
          {/* loadingMinutes が true のときに作成中のテキストを表示 */}
          {loadingMinutes ? (
            <div className="text-slate-500 animate-pulse">作成中...</div>
          ) : (
            minutes || "未作成"
          )}
        </div>
      </section>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
