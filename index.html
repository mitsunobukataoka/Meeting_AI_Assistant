<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>会議AIアシスト</title>
  <link rel="icon" href="favicon.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { indigo: { 950: '#1e1b4b' } },
          boxShadow: { soft: '0 2px 12px rgba(0,0,0,0.06)' },
          keyframes: {
            ripple: {
              '0%': { boxShadow: '0 0 0 0 rgba(79,70,229,0.4)' },
              '100%': { boxShadow: '0 0 0 16px rgba(79,70,229,0)' }
            }
          },
          animation: { ripple: 'ripple 1.2s infinite' }
        }
      }
    };
  </script>

  <style>
    .thin-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .thin-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
    .thin-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
    .minutes-content p { margin-bottom: 0.5rem; }
  </style>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-slate-50 text-slate-800">
<div id="root" class="min-h-screen"></div>

<script type="text/babel">

const POWER_AUTOMATE_URL = "https://default3d540d42b0fd4a55b84fb51a4a6da5.a3.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/4d600fd0b5aa4cb299968b98671ce7eb/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=08qqzyn5t5y3Z0x1TPuaB5EQLrhA2vxTqkZvxWE5yA4";
const RECOGNITION_LANG = "ja-JP";
const STORAGE_KEY = "interview_ai_history";

/* ---------------- Icons ---------------- */
const Icon = ({name, className="w-5 h-5"}) => {
  const common = "fill-none stroke-current stroke-[1.6]";
  switch (name) {
    case "mic": return (
      <svg className={`${className} ${common}`} viewBox="0 0 24 24">
        <path d="M12 1.5a3.5 3.5 0 0 1 3.5 3.5v6a3.5 3.5 0 0 1-7 0v-6A3.5 3.5 0 0 1 12 1.5z"/>
        <path d="M19 11a7 7 0 0 1-14 0"/><path d="M12 18v4"/>
      </svg>
    );
    case "stop": return (
      <svg className={`${className} ${common}`} viewBox="0 0 24 24">
        <rect x="6" y="6" width="12" height="12" rx="2"/>
      </svg>
    );
    case "save": return (
      <svg className={`${className} ${common}`} viewBox="0 0 24 24">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <polyline points="17 21 17 13 7 13 7 21"/>
        <polyline points="7 3 7 8 15 8"/>
      </svg>
    );
    case "trash": return (
      <svg className={`${className} ${common}`} viewBox="0 0 24 24">
        <path d="M3 6h18"/>
        <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6M14 11v6"/>
      </svg>
    );
    case "history": return (
      <svg className={`${className} ${common}`} viewBox="0 0 24 24">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/><path d="M12 7v5l4 2"/>
      </svg>
    );
    default: return null;
  }
};

const Toast = ({msg, onClose}) => (
  <div className="fixed top-4 right-4 z-50 animate-bounce">
    <div className="bg-slate-900 text-white px-4 py-2 rounded shadow-lg flex items-center gap-2 text-sm">
      <span>{msg}</span>
      <button onClick={onClose} className="ml-2 hover:text-indigo-400">×</button>
    </div>
  </div>
);

/* ===================== APP ===================== */
function App() {
  const [isRecording, setIsRecording] = React.useState(false);
  const [finalChunks, setFinalChunks] = React.useState([]);
  const [interim, setInterim] = React.useState("");
  const [preInfo, setPreInfo] = React.useState("");
  const [suggestions, setSuggestions] = React.useState([]);
  const [minutes, setMinutes] = React.useState("");
  const [loadingAI, setLoadingAI] = React.useState(false);
  const [loadingMinutes, setLoadingMinutes] = React.useState(false);
  const [toastMsg, setToastMsg] = React.useState("");
  const [history, setHistory] = React.useState([]);

  const transcriptRef = React.useRef(null);
  const recognitionRef = React.useRef(null);
  const streamRef = React.useRef(null);
  const manualStopRef = React.useRef(false);

  // 初期読み込み
  React.useEffect(() => {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) setHistory(JSON.parse(saved));
  }, []);

  React.useEffect(() => {
    if (transcriptRef.current) {
      transcriptRef.current.scrollTop = transcriptRef.current.scrollHeight;
    }
  }, [finalChunks, interim]);

  const ensureRecognition = React.useCallback(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return null;
    if (!recognitionRef.current) {
      const r = new SR();
      r.lang = RECOGNITION_LANG;
      r.interimResults = true;
      r.continuous = true;
      r.onresult = (e) => {
        let inter = "";
        const finals = [];
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const res = e.results[i];
          if (res.isFinal) finals.push(res[0].transcript.trim());
          else inter += res[0].transcript;
        }
        if (finals.length) setFinalChunks(p => [...p, ...finals]);
        setInterim(inter.trim());
      };
      r.onerror = (e) => {
        console.error("SR Error:", e.error);
        if (e.error === 'network') setToastMsg("ネットワークエラー発生");
      };
      r.onend = () => { if (!manualStopRef.current) try { r.start(); } catch {} };
      recognitionRef.current = r;
    }
    return recognitionRef.current;
  }, []);

  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
      streamRef.current = stream;
      manualStopRef.current = false;
      ensureRecognition().start();
      setIsRecording(true);
      stream.getVideoTracks()[0].onended = stopRecording;
    } catch (e) {
      setToastMsg("画面共有がキャンセルされました");
    }
  }

  function stopRecording() {
    manualStopRef.current = true;
    recognitionRef.current?.stop();
    streamRef.current?.getTracks().forEach(t => t.stop());
    setIsRecording(false);
  }

  const fullText = (finalChunks.join(" ") + " " + interim).trim();

  async function callPowerAutomate(type) {
    if (!fullText) { setToastMsg("文字起こしがありません"); return; }
    type === "suggest" ? setLoadingAI(true) : setLoadingMinutes(true);

    try {
      const res = await fetch(POWER_AUTOMATE_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          timestamp: new Date().toISOString(),
          transcript: fullText,
          requestType: type,
          preInfo: preInfo
        })
      });
      const text = await res.text();
      type === "suggest" ? setSuggestions(text.split(/\n+/).filter(Boolean)) : setMinutes(text);
    } catch {
      setToastMsg("通信エラーが発生しました");
    } finally {
      setLoadingAI(false);
      setLoadingMinutes(false);
    }
  }

  // 記録保存
  const saveRecord = () => {
    if (!fullText && !minutes) return setToastMsg("保存する内容がありません");
    const newEntry = {
      id: Date.now(),
      date: new Date().toLocaleString('ja-JP'),
      preInfo,
      transcript: fullText,
      suggestions,
      minutes
    };
    const newHistory = [newEntry, ...history].slice(0, 20); // 最大20件
    setHistory(newHistory);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(newHistory));
    setToastMsg("記録を保存しました");
  };

  // 履歴復元
  const loadEntry = (entry) => {
    if (!confirm("現在の内容を上書きして履歴を読み込みますか？")) return;
    setPreInfo(entry.preInfo || "");
    setFinalChunks([entry.transcript || ""]);
    setInterim("");
    setSuggestions(entry.suggestions || []);
    setMinutes(entry.minutes || "");
    setToastMsg("履歴を読み込みました");
  };

  // 全クリア
  const clearAll = () => {
    if (!confirm("現在の表示内容をリセットしますか？")) return;
    setFinalChunks([]); setInterim(""); setPreInfo(""); setSuggestions([]); setMinutes("");
  };

  return (
    <div className="max-w-5xl mx-auto px-4 py-6 flex flex-col gap-6 min-h-screen">
      {toastMsg && <Toast msg={toastMsg} onClose={() => setToastMsg("")} />}

      <header className="flex justify-between items-end border-b pb-4">
        <div>
          <h1 className="text-2xl font-bold text-indigo-900 flex gap-2 items-center">
            <Icon name="mic" className="text-indigo-600" /> 会議AIアシスト
          </h1>
          <p className="text-xs text-slate-500 mt-1">※録音開始で画面共有(音声含む)を選択してください</p>
        </div>
        <div className="flex gap-2">
          {!isRecording ? (
            <button onClick={startRecording} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded flex items-center gap-2 transition shadow-sm">
              <span className="w-2 h-2 bg-white rounded-full animate-pulse"></span> 録音開始
            </button>
          ) : (
            <button onClick={stopRecording} className="bg-rose-600 hover:bg-rose-700 text-white px-4 py-2 rounded flex items-center gap-2 transition shadow-sm animate-ripple">
              <Icon name="stop" className="w-4 h-4" /> 停止
            </button>
          )}
          <button onClick={saveRecord} className="bg-white border border-slate-300 hover:bg-slate-50 px-4 py-2 rounded flex items-center gap-2 transition shadow-sm text-slate-700">
            <Icon name="save" className="w-4 h-4 text-slate-500" /> 保存
          </button>
          <button onClick={clearAll} className="p-2 text-slate-400 hover:text-rose-500 transition" title="表示をクリア">
            <Icon name="trash" />
          </button>
        </div>
      </header>

      {/* 履歴リスト */}
      {history.length > 0 && (
        <section>
          <div className="flex items-center gap-2 mb-2 text-slate-600">
            <Icon name="history" className="w-4 h-4" />
            <h2 className="font-bold text-sm">履歴から復元</h2>
          </div>
          <div className="flex gap-2 overflow-x-auto pb-2 thin-scrollbar">
            {history.map(entry => (
              <button 
                key={entry.id} 
                onClick={() => loadEntry(entry)}
                className="whitespace-nowrap bg-white border border-slate-200 px-3 py-1.5 rounded-full text-xs hover:border-indigo-400 hover:text-indigo-600 transition shadow-sm"
              >
                {entry.date}
              </button>
            ))}
          </div>
        </section>
      )}

      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div className="flex flex-col gap-6">
          {/* 意見案 */}
          <section className="flex flex-col h-full">
            <div className="flex justify-between items-center mb-2">
              <h2 className="font-bold text-sm text-slate-600">AI意見案</h2>
              <button onClick={() => callPowerAutomate("suggest")} disabled={loadingAI || isRecording} className="text-xs bg-indigo-100 text-indigo-700 px-2 py-1 rounded hover:bg-indigo-200 disabled:opacity-50 transition">
                {loadingAI ? "生成中..." : "案を更新"}
              </button>
            </div>
            <div className="bg-white p-4 rounded-xl shadow-soft border border-indigo-50 flex-grow min-h-[120px]">
              {loadingAI ? (
                <div className="space-y-2 animate-pulse">
                  <div className="h-4 bg-slate-100 rounded w-3/4"></div>
                  <div className="h-4 bg-slate-100 rounded w-full"></div>
                </div>
              ) : (
                <ul className="space-y-2">
                  {suggestions.length > 0 ? suggestions.map((s, i) => (
                    <li key={i} className="text-sm border-l-2 border-indigo-400 pl-3 py-1 bg-slate-50 rounded-r">{s}</li>
                  )) : <p className="text-slate-400 text-sm italic">会議中に「案を更新」を押してください</p>}
                </ul>
              )}
            </div>
          </section>

          {/* 事前情報 */}
          <section>
            <h2 className="font-bold text-sm mb-2 text-slate-600">事前情報 / メモ</h2>
            <textarea
              value={preInfo}
              onChange={e => setPreInfo(e.target.value)}
              className="w-full h-32 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition shadow-inner"
              placeholder="例：会議の内容・会議の目的・事前に知っている情報など"
            />
          </section>
        </div>

        <div className="flex flex-col gap-6">
          {/* 文字起こし */}
          <section>
            <h2 className="font-bold text-sm mb-2 text-slate-600">ライブ文字起こし</h2>
            <div ref={transcriptRef} className="bg-slate-900 text-slate-300 p-4 rounded-xl h-48 overflow-y-auto text-sm leading-relaxed font-mono shadow-lg border-t-4 border-indigo-500">
              {fullText ? (
                <div>
                  {finalChunks.map((t, i) => <p key={i} className="mb-1">{t}</p>)}
                  <span className="text-indigo-400 animate-pulse">{interim}</span>
                </div>
              ) : (
                <p className="text-slate-600 italic">録音を開始するとここにテキストが表示されます...</p>
              )}
            </div>
          </section>

          {/* 議事録 */}
          <section>
            <div className="flex justify-between items-center mb-2">
              <h2 className="font-bold text-sm text-slate-600">要約・議事録</h2>
              <button onClick={() => callPowerAutomate("minutes")} disabled={loadingMinutes || isRecording} className="text-xs bg-emerald-100 text-emerald-700 px-2 py-1 rounded hover:bg-emerald-200 disabled:opacity-50 transition">
                {loadingMinutes ? "作成中..." : "議事録を生成"}
              </button>
            </div>
            <div className="bg-emerald-50 p-4 rounded-xl min-h-[160px] whitespace-pre-wrap text-sm text-slate-700 border border-emerald-100 shadow-soft">
              {loadingMinutes ? (
                <div className="text-emerald-600 animate-pulse flex items-center gap-2">
                  <span>AIが内容を整理しています...</span>
                </div>
              ) : (
                minutes || <p className="text-slate-400 italic">会議終了後に生成してください</p>
              )}
            </div>
          </section>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
